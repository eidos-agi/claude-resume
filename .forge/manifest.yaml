# .forge/manifest.yaml — resume-resume
# Post-crash Claude Code session recovery TUI
# Generated by /forge-manifest-init on 2026-03-22

manifest_version: 1

repo:
  visibility: private
  org: eidos-agi
  topics: [claude-code, session-recovery, tui, mcp, python]

packaging:
  build_system: setuptools  # TODO: migrate to hatchling (TASK-0004)
  pypi:
    name: resume-resume
    publish: true
    trusted_publisher:
      owner: eidos-agi
      repo: resume-resume
      workflow: publish.yml
      environment: pypi
  readme:
    absolute_images: true

quality:
  required_files:
    - LICENSE
    - README.md
    - CHANGELOG.md
    - SECURITY.md
  min_grade:
    foss_check: B
    ship_check: pass
    sec_audit: clean

security:
  secret_scanning: true
  dependency_audit: true

dependencies:
  max_count: 5

ci:
  workflows:
    ci: true
    publish: true
  permissions:
    contents_read: true
  pre_commit: true
  build_verification: true

exceptions:
  - rule: dependencies.heavy_warning.numpy
    justification: "numpy required for session classification model embeddings"
    owner: daniel@eidosagi.com
    expires: 2026-06-22
